<header class="map-header">
  <div class="header-content">
    <h1>🚬 SzlugOFF</h1>
    <a routerLink="/authorities" class="btn-admin">👮‍♂️ Panel</a>
  </div>
</header>

<div class="map-container" id="map"></div>

<div class="center-target">
  <img src="https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png" alt="Celownik" style="height: 40px;" />
</div>

<div class="bottom-panel">
  <h3>Zgłoś Zdarzenie</h3>

  <div class="form-row">
    <select [(ngModel)]="selectedEvent" class="event-select">
      <option *ngFor="let type of eventTypes" [value]="type">
        {{ type }}
      </option>
    </select>

    <button (click)="reportAtCenter()">
      ZGŁOŚ TERAZ
    </button>
  </div>
</div>
