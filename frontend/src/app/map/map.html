<div class="map-container" id="map"></div>

<div class="center-target">
  <img src="https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png" alt="Celownik" style="height: 40px;" />
</div>

<div class="bottom-panel">
  <h3>🚬 Zgłoś Palacza</h3>
  <div class="coordinates">
    {{ currentCenter?.lat | number:'1.4-4' }}, {{ currentCenter?.lng | number:'1.4-4' }}
  </div>
  
  <div class="form-row">
    <input #descInput type="text" placeholder="Opis (np. Przystanek Centrum)" />
    <button (click)="reportAtCenter(descInput.value); descInput.value = ''">
      ZGŁOŚ TERAZ
    </button>
  </div>
</div>
